# ConfigMap holding the cost catalog for CPA + gpu-cost-aware router.
#
# CPA and gpu-cost-aware both read the same catalog. Default values are
# compiled into the gateway-plugin / controller-manager binary. This
# ConfigMap is for production overrides (e.g., reflecting negotiated
# enterprise pricing or new GPU SKUs).
#
# Mount path inside the pod: /etc/aibrix/cost-catalog.json
# Set env var AIBRIX_COST_CATALOG_PATH to override.
apiVersion: v1
kind: ConfigMap
metadata:
  name: aibrix-cost-catalog
  namespace: aibrix-system
  labels:
    app.kubernetes.io/name: aibrix
    app.kubernetes.io/component: cost-catalog
data:
  cost-catalog.json: |
